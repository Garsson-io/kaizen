name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shell-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run build
      - name: Run shell hook tests
        run: bash .claude/hooks/tests/run-all-tests.sh
      - name: Verify no test side-effects on repo files
        run: |
          DIRTY=$(git status --porcelain)
          if [ -n "$DIRTY" ]; then
            echo "::error::Tests left side-effects on repo files (kaizen #448):"
            echo "$DIRTY"
            exit 1
          fi

  hook-integrity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate hook file integrity
        run: bash .claude/hooks/tests/validate-hook-integrity.sh

  ts-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run build
      - run: npm test
      - name: Verify no test side-effects on repo files
        run: |
          DIRTY=$(git status --porcelain)
          if [ -n "$DIRTY" ]; then
            echo "::error::Tests left side-effects on repo files (kaizen #448):"
            echo "$DIRTY"
            exit 1
          fi
