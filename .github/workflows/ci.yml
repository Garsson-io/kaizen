name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: TypeScript typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck

  shell-tests:
    name: Shell hook tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      # The Python hook lifecycle suite (test_hooks.py) MUST gate in CI — a
      # missing runner used to silently skip it, producing green CI while the
      # local suite was red (#1481). Install pytest and require it.
      - name: Install pytest
        run: python -m pip install --upgrade pytest
      - run: npm ci
      - run: npm run build
      - name: Run shell hook tests
        env:
          KAIZEN_REQUIRE_PYTHON_TESTS: '1'
        run: bash .claude/hooks/tests/run-all-tests.sh
      - name: Verify no test side-effects on repo files
        run: |
          DIRTY=$(git status --porcelain)
          if [ -n "$DIRTY" ]; then
            echo "::error::Tests left side-effects on repo files (kaizen #448):"
            echo "$DIRTY"
            exit 1
          fi

  hook-integrity:
    name: Hook integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate hook file integrity
        run: bash .claude/hooks/tests/validate-hook-integrity.sh

  known-failures:
    name: Known-failure ownership
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # #1518: the known-failures registry must be schema-valid and every entry's
      # owning issue must still be OPEN. A closed/missing owner fails CI, forcing
      # the failure to be fixed or re-filed — it can't become invisible noise.
      - name: Validate known-failure ownership
        env:
          GH_TOKEN: ${{ github.token }}
        run: npx tsx scripts/known-failures-status.ts --validate --repo "$GITHUB_REPOSITORY"

  ts-tests-shard:
    name: TypeScript tests + coverage shard ${{ matrix.shard }}/2
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # Shard 1 contains cold-start-bound TypeScript subprocess tests. Their
      # helper uses Bun when available and falls back to Node+tsx otherwise.
      - uses: oven-sh/setup-bun@v2
        if: ${{ matrix.shard == 1 }}
      - run: npm ci
      - run: npm run build
      - name: Run coverage shard
        run: |
          mkdir -p artifacts/vitest-blob
          npm run test:ci:shard -- \
            --shard=${{ matrix.shard }}/2 \
            --outputFile.blob=artifacts/vitest-blob/blob-${{ matrix.shard }}-2.json

      - name: Upload coverage shard report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vitest-blob-${{ matrix.shard }}
          path: artifacts/vitest-blob/*.json
          if-no-files-found: error

  ts-tests:
    name: TypeScript tests + coverage
    runs-on: ubuntu-latest
    needs: ts-tests-shard
    if: always()
    steps:
      - name: Require successful coverage shards
        if: ${{ needs.ts-tests-shard.result != 'success' }}
        run: |
          echo "::error::Coverage shard job result: ${{ needs.ts-tests-shard.result }}"
          exit 1

      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      - name: Download coverage shard reports
        uses: actions/download-artifact@v4
        with:
          pattern: vitest-blob-*
          path: artifacts/vitest-blob
          merge-multiple: true

      - name: Merge tests and coverage
        run: npm run test:ci:merge

      - name: Upload test and coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts
          path: artifacts/
          if-no-files-found: warn

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: artifacts/coverage/cobertura-coverage.xml,artifacts/coverage/lcov.info
          fail_ci_if_error: false
          verbose: true

      - name: Coverage summary
        if: always()
        run: node scripts/coverage-summary.mjs

      - name: Verify no test side-effects on repo files
        run: |
          # Filter out artifacts/ (our own coverage output) and the codecov
          # uploader binary+signatures that codecov/codecov-action@v5 drops
          # into the repo root. These are CI-step side-effects, not test
          # side-effects, so they shouldn't trigger the #448 guard.
          DIRTY=$(git status --porcelain \
            | grep -Ev '^\?\? (artifacts/|codecov(\.SHA256SUM(\.sig)?)?$)' \
            || true)
          if [ -n "$DIRTY" ]; then
            echo "::error::Tests left side-effects on repo files (kaizen #448):"
            echo "$DIRTY"
            exit 1
          fi
